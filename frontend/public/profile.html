<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkSutra — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables — Themes ───────────────────────────── */
    :root {
      --bg:          #F7F5F2;
      --surface:     #FFFFFF;
      --border:      #E8E4DF;
      --text-primary:#1A1614;
      --text-secondary:#7A716B;
      --accent:      #2D2926;
      --accent-soft: #F0EDE8;
      --link-hover:  #1A1614;
      --shadow:      0 2px 16px rgba(0,0,0,0.07);
      --shadow-hover:0 6px 28px rgba(0,0,0,0.13);
      --avatar-border:#E8E4DF;
      --btn-bg:      #FFFFFF;
      --btn-text:    #1A1614;
      --btn-border:  #D8D2CB;
    }

    [data-theme="dark"] {
      --bg:          #0E0E10;
      --surface:     #1A1A1E;
      --border:      #2A2A30;
      --text-primary:#F0EDE8;
      --text-secondary:#7A7680;
      --accent:      #E8E4DF;
      --accent-soft: #1E1E24;
      --link-hover:  #FFFFFF;
      --shadow:      0 2px 16px rgba(0,0,0,0.4);
      --shadow-hover:0 6px 28px rgba(0,0,0,0.6);
      --avatar-border:#2A2A30;
      --btn-bg:      #1A1A1E;
      --btn-text:    #F0EDE8;
      --btn-border:  #2A2A30;
    }

    [data-theme="colorful"] {
      --bg:          #FFF8F0;
      --surface:     #FFFFFF;
      --border:      #FFD9B3;
      --text-primary:#1A0A00;
      --text-secondary:#9B6A3A;
      --accent:      #E05C1A;
      --accent-soft: #FFF0E0;
      --link-hover:  #C04A0E;
      --shadow:      0 2px 16px rgba(224,92,26,0.10);
      --shadow-hover:0 6px 28px rgba(224,92,26,0.22);
      --avatar-border:#FFD9B3;
      --btn-bg:      #FFFFFF;
      --btn-text:    #1A0A00;
      --btn-border:  #FFD9B3;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Theme Switcher ──────────────────────────────────── */
    .theme-bar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 36px;
    }

    .theme-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: var(--accent); }
    .theme-btn.active::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      opacity: 0.4;
    }
    .theme-btn[data-t="minimal"] { background: #F7F5F2; }
    .theme-btn[data-t="dark"]    { background: #0E0E10; }
    .theme-btn[data-t="colorful"]{ background: linear-gradient(135deg, #FFB347, #E05C1A); }

    /* ── Profile Header ──────────────────────────────────── */
    .profile-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 2px solid var(--avatar-border);
      object-fit: cover;
      background: var(--accent-soft);
      display: block;
      transition: border-color 0.35s;
    }

    .avatar-placeholder {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 2px solid var(--avatar-border);
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-secondary);
      transition: border-color 0.35s, background 0.35s;
    }

    .display-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
      transition: color 0.35s;
    }

    .username-tag {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }

    .bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto;
      font-weight: 300;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 28px auto;
      transition: background 0.35s;
    }

    /* ── Links List ──────────────────────────────────────── */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--btn-text);
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.35s;
      cursor: pointer;
      animation: fadeUp 0.4s ease both;
    }

    .link-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    .link-item:active {
      transform: translateY(0px);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .link-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.35s;
    }

    .link-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.35s;
    }

    .link-url {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
      transition: color 0.35s;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-arrow {
      color: var(--text-secondary);
      font-size: 14px;
      flex-shrink: 0;
      transition: transform 0.18s, color 0.18s;
    }

    .link-item:hover .link-arrow {
      transform: translateX(3px);
      color: var(--text-primary);
    }

    /* ── Stagger animation on links ──────────────────────── */
    .link-item:nth-child(1) { animation-delay: 0.05s; }
    .link-item:nth-child(2) { animation-delay: 0.10s; }
    .link-item:nth-child(3) { animation-delay: 0.15s; }
    .link-item:nth-child(4) { animation-delay: 0.20s; }
    .link-item:nth-child(5) { animation-delay: 0.25s; }
    .link-item:nth-child(6) { animation-delay: 0.30s; }
    .link-item:nth-child(7) { animation-delay: 0.35s; }
    .link-item:nth-child(8) { animation-delay: 0.40s; }

    /* ── Empty / Error states ────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .state-msg .emoji { font-size: 32px; display: block; margin-bottom: 10px; }

    /* ── Skeleton loader ─────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--accent-soft) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    .skeleton-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      margin: 0 auto 18px;
    }
    .skeleton-line {
      height: 14px;
      margin: 8px auto;
    }
    .skeleton-link {
      height: 66px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    /* ── Footer ──────────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 48px;
    }

    .footer a {
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 400;
      letter-spacing: 0.3px;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .footer a:hover { color: var(--text-primary); }

    .footer-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--border);
      display: inline-block;
      vertical-align: middle;
    }

    /* ── Not found ───────────────────────────────────────── */
    .not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .not-found h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 48px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .not-found p {
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="page" id="app">
    <!-- Content injected by JS -->
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    // ── Get username from URL ──────────────────────────────
    // URL format: /profile.html?u=username  OR  /:username (if server configured)
    function getUsername() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('u')) return params.get('u');
      // Try path: /profile/arpit → extract last segment
      const path = window.location.pathname;
      const parts = path.split('/').filter(Boolean);
      if (parts.length > 0) return parts[parts.length - 1];
      return null;
    }

    // ── Theme ──────────────────────────────────────────────
    const THEMES = ['minimal', 'dark', 'colorful'];
    let currentTheme = localStorage.getItem('ls_theme') || 'minimal';

    function setTheme(t) {
      currentTheme = t;
      document.documentElement.setAttribute('data-theme', t === 'minimal' ? '' : t);
      localStorage.setItem('ls_theme', t);
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.t === t);
      });
    }

    // ── Icon mapping ───────────────────────────────────────
    const ICON_MAP = {
      youtube:   '▶️', instagram: '📸', twitter: '🐦', x: '🐦',
      github:    '💻', linkedin:  '💼', portfolio:'🌐', website: '🌐',
      spotify:   '🎵', discord:   '💬', telegram: '✈️', whatsapp:'💬',
      facebook:  '📘', tiktok:    '🎵', twitch:   '🎮', default: '🔗'
    };

    function getIcon(title, url) {
      const key = (title + url).toLowerCase();
      for (const [k, v] of Object.entries(ICON_MAP)) {
        if (key.includes(k)) return v;
      }
      return ICON_MAP.default;
    }

    function cleanUrl(url) {
      return url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0];
    }

    // ── Track click ────────────────────────────────────────
    async function trackClick(linkId, url) {
      try {
        await fetch(`${API}/links/${linkId}/click`);
      } catch (_) {}
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    // ── Render skeleton ────────────────────────────────────
    function renderSkeleton() {
      return `
        <div class="theme-bar">
          ${THEMES.map(t => `<button class="theme-btn ${t === currentTheme ? 'active' : ''}" data-t="${t}" onclick="setTheme('${t}')"></button>`).join('')}
        </div>
        <div class="profile-header">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton skeleton-line" style="width:140px"></div>
          <div class="skeleton skeleton-line" style="width:80px; height:10px"></div>
          <div class="skeleton skeleton-line" style="width:220px; height:10px; margin-top:14px"></div>
        </div>
        <div class="divider"></div>
        <div class="links-list">
          ${[1,2,3].map(() => `<div class="skeleton skeleton-link"></div>`).join('')}
        </div>`;
    }

    // ── Render profile ─────────────────────────────────────
    function renderProfile(data) {
      const avatarEl = data.avatar_url
        ? `<img class="avatar" src="${data.avatar_url}" alt="${data.display_name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"  /><div class="avatar-placeholder" style="display:none">${(data.display_name || data.username)[0].toUpperCase()}</div>`
        : `<div class="avatar-placeholder">${(data.display_name || data.username)[0].toUpperCase()}</div>`;

      const linksHtml = data.links && data.links.length > 0
        ? data.links.map(link => `
            <div class="link-item" onclick="trackClick(${link.id}, '${link.url}')">
              <div class="link-left">
                <div class="link-icon">${getIcon(link.title, link.url)}</div>
                <div>
                  <div class="link-title">${link.title}</div>
                  <div class="link-url">${cleanUrl(link.url)}</div>
                </div>
              </div>
              <span class="link-arrow">→</span>
            </div>`).join('')
        : `<div class="state-msg"><span class="emoji">🔗</span>No links added yet.</div>`;

      return `
        <div class="theme-bar">
          ${THEMES.map(t => `<button class="theme-btn ${t === currentTheme ? 'active' : ''}" data-t="${t}" onclick="setTheme('${t}')"></button>`).join('')}
        </div>
        <div class="profile-header">
          <div class="avatar-wrap">${avatarEl}</div>
          <h1 class="display-name">${data.display_name || data.username}</h1>
          <p class="username-tag">@${data.username}</p>
          ${data.bio ? `<p class="bio">${data.bio}</p>` : ''}
        </div>
        <div class="divider"></div>
        <div class="links-list">${linksHtml}</div>
        <div class="footer">
          <a href="/" title="Powered by LinkSutra">
            <span class="footer-dot"></span>
            LinkSutra
            <span class="footer-dot"></span>
          </a>
        </div>`;
    }

    // ── Render not found ───────────────────────────────────
    function renderNotFound(username) {
      return `
        <div class="theme-bar">
          ${THEMES.map(t => `<button class="theme-btn ${t === currentTheme ? 'active' : ''}" data-t="${t}" onclick="setTheme('${t}')"></button>`).join('')}
        </div>
        <div class="not-found">
          <h1>404</h1>
          <p>@${username} — profile not found.</p>
        </div>`;
    }

    // ── Main ───────────────────────────────────────────────
    async function init() {
      const app = document.getElementById('app');
      const username = getUsername();

      // Apply saved theme first
      setTheme(currentTheme);

      if (!username || username === 'profile.html') {
        app.innerHTML = `<div class="state-msg"><span class="emoji">🧵</span>No username provided.<br>Use <code>?u=username</code> in the URL.</div>`;
        return;
      }

      // Show skeleton while loading
      app.innerHTML = renderSkeleton();
      // Re-attach theme btn listeners after skeleton inject
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.onclick = () => setTheme(btn.dataset.t);
      });

      try {
        const res = await fetch(`${API}/links/profile/${username}`);
        if (res.status === 404) {
          app.innerHTML = renderNotFound(username);
          return;
        }
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();

        // Update page title
        document.title = `${data.display_name || data.username} — LinkSutra`;

        app.innerHTML = renderProfile(data);
        // Re-attach theme btn listeners
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.onclick = () => setTheme(btn.dataset.t);
        });

      } catch (err) {
        app.innerHTML = `<div class="state-msg"><span class="emoji">⚠️</span>Could not load profile.<br>Make sure the backend is running.</div>`;
      }
    }

    init();
  </script>
</body>
</html>
